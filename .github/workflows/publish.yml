name: Publish Images
on:
  release:
    types:
      - published
  push:
    tags:
      - "**"
  workflow_dispatch: {}
concurrency:
  group: publish-${{ github.event.release.tag_name || github.ref_name || github.run_id }}
  cancel-in-progress: true
jobs:
  discover:
    name: Discover Images
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
      has_images: ${{ steps.discover.outputs.has_images }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history to compare tags

      - name: Build image matrix
        id: discover
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          # Find the previous tag to diff against
          current_tag="${{ github.ref_name }}"
          previous_tag="$(git tag --sort=-creatordate | grep -v "^${current_tag}$" | head -n1 || true)"

          if [[ -z "$previous_tag" ]]; then
            echo "No previous tag found — treating all images as changed"
          else
            echo "Comparing against previous tag: $previous_tag"
          fi

          entries=()

          for dockerfile in images/*/Dockerfile; do
            image_dir="$(dirname "$dockerfile")"
            image_name="$(basename "$image_dir")"
            version_file="$image_dir/VERSION"

            if [[ ! -f "$version_file" ]]; then
              echo "::error file=$version_file::Missing VERSION file for $image_name"
              exit 1
            fi

            version="$(tr -d '[:space:]' < "$version_file")"
            if [[ -z "$version" ]]; then
              echo "::error file=$version_file::VERSION file for $image_name is empty"
              exit 1
            fi

            # Decide whether to include this image
            should_build=false

            if [[ -z "$previous_tag" ]]; then
              # No previous tag: build everything
              should_build=true
              reason="no previous tag"
            else
              # Check if VERSION file existed in the previous tag
              previous_version="$(git show "${previous_tag}:${version_file}" 2>/dev/null | tr -d '[:space:]' || true)"

              if [[ -z "$previous_version" ]]; then
                # VERSION file didn't exist before → new image
                should_build=true
                reason="new image (no VERSION in $previous_tag)"
              elif [[ "$previous_version" != "$version" ]]; then
                # Version changed
                should_build=true
                reason="version changed ($previous_version → $version)"
              else
                reason="unchanged (version $version)"
              fi
            fi

            if [[ "$should_build" == "true" ]]; then
              echo "✅ $image_name: $reason"
              entries+=("$(jq -nc \
                --arg image "$image_name" \
                --arg dockerfile "$dockerfile" \
                --arg version "$version" \
                --arg package "ghcr.io/hillerlab/${image_name}" \
                '{image: $image, dockerfile: $dockerfile, version: $version, package: $package}')")
            else
              echo "⏭️  $image_name: $reason — skipping"
            fi
          done

          if [[ ${#entries[@]} -eq 0 ]]; then
            echo "No images have changed — nothing to build"
            echo "matrix=[]" >> "$GITHUB_OUTPUT"
            echo "has_images=false" >> "$GITHUB_OUTPUT"
          else
            matrix="$(printf '%s\n' "${entries[@]}" | jq -sc '.')"
            echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
            echo "has_images=true" >> "$GITHUB_OUTPUT"
          fi

  publish:
    name: Publish ${{ matrix.image }}
    needs: discover
    if: needs.discover.outputs.has_images == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          build-args: |
            MODULE_VERSION=${{ matrix.version }}
          tags: |
            ${{ matrix.package }}:${{ matrix.version }}
            ${{ matrix.package }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.title=${{ matrix.image }}
            org.opencontainers.image.version=${{ matrix.version }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          pull: true
          push: true
